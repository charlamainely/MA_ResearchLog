      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        ctx.imageSmoothingEnabled = false;

        const sideMargin = Math.round(Math.max(18, W * 0.08));
        road.left = sideMargin;
        road.right = W - sideMargin;
        road.width = road.right - road.left;
        road.laneWidth = road.width / road.laneCount;
        road.topY = 0;
        road.bottomY = H;

        buildSkyline();
        buildRoadDecals();
        refreshResponsiveLongLayouts();
      }

      function buildSkyline() {
        skyline = [];
        let x = -60;
        while (x < W + 80) {
          const w = rand(40, 120);
          const h = rand(60, 220);
          skyline.push({ x, w, h });
          x += w + rand(20, 50);
        }
      }

      function buildRoadDecals() {
        const pixel = Math.max(2, Math.round(road.laneWidth * (W <= 820 ? 0.032 : 0.024)));
        const rowCount = 128;
        const colCount = Math.max(24, Math.floor(road.width / pixel));
        const rows = [];
        for (let r = 0; r < rowCount; r++) {
          const seed = r * 17.131;
          const dirt = [];
          const dirtCount = Math.floor(hash01(seed + 0.6) * 4);
          for (let i = 0; i < dirtCount; i++) {
            const w = 1 + Math.floor(hash01(seed + 3.7 + i * 1.23) * 3);
            const x = Math.floor(hash01(seed + 7.3 + i * 2.11) * Math.max(1, colCount - w - 1));
            const tone = hash01(seed + 11.9 + i * 0.71) > 0.5 ? '#2b2b2b' : '#3c3c3c';
            dirt.push({ x, w, tone });
          }
          rows.push({ dirt });
        }
        roadDecals = { pixel, rowCount, colCount, rows };
      }

      function drawRoadDecals(scrollDistance) {
        if (!roadDecals) return;
        const pixel = roadDecals.pixel;
        const flowPx = Math.floor(scrollDistance * 0.38);
        for (let y = road.topY - pixel; y < road.bottomY + pixel; y += pixel) {
          const rowIndex = mod(Math.floor((y - flowPx - road.topY) / pixel), roadDecals.rowCount);
          const row = roadDecals.rows[rowIndex];
          const drawY = Math.round(y);
          for (const dirt of row.dirt) {
            ctx.fillStyle = dirt.tone;
            ctx.fillRect(Math.round(road.left + dirt.x * pixel), drawY, dirt.w * pixel, pixel);
          }
        }
      }

      function drawSidewalkTiles(scrollDistance) {
        const sidewalkTile = getImageByPath(SIDEWALK_TILE_SRC);
        if (!sidewalkTile || !sidewalkTile.complete || sidewalkTile.naturalWidth < 1) {
          ctx.fillStyle = '#999697';
          ctx.fillRect(0, 0, road.left, H);
          ctx.fillRect(road.right, 0, W - road.right, H);
          return;
        }

        const tileSize = clamp(Math.round(road.laneWidth * 0.28), 40, 80);
        const flowPx = mod(Math.floor(scrollDistance * 0.38), tileSize);
        const drawStrip = (startX, stripWidth) => {
          const endX = startX + stripWidth;
          for (let y = flowPx - tileSize; y < H + tileSize; y += tileSize) {
            for (let x = startX; x < endX; x += tileSize) {
              ctx.drawImage(
                sidewalkTile,
                Math.round(x),
                Math.round(y),
                tileSize,
                tileSize
              );
            }
          }
        };

        drawStrip(0, road.left);
        drawStrip(road.right, W - road.right);
      }

      function pickSidewalkAssetPath() {
        if (!Array.isArray(sidewalkDecorPaths) || sidewalkDecorPaths.length === 0) return '';
        if (!state.lastSidewalkAssetPath || sidewalkDecorPaths.length === 1) return pickOne(sidewalkDecorPaths);
        const options = sidewalkDecorPaths.filter((p) => p !== state.lastSidewalkAssetPath);
        return pickOne(options.length > 0 ? options : sidewalkDecorPaths);
      }

      function spawnSidewalkDecor() {
        if (!Array.isArray(sidewalkDecorPaths) || sidewalkDecorPaths.length === 0) return false;
        if (state.sidewalkDecors.length >= MAX_SIDEWALK_DECORS) return false;
        const path = pickSidewalkAssetPath();
        if (!path) return false;

        const leftCount = state.sidewalkDecors.filter((d) => d.side === -1).length;
        const rightCount = state.sidewalkDecors.filter((d) => d.side === 1).length;
        let side = state.lastSidewalkSide === 1 ? -1 : 1;
        if (leftCount < rightCount) side = -1;
        if (rightCount < leftCount) side = 1;
        if (Math.abs(leftCount - rightCount) <= 1 && Math.random() < 0.25) side *= -1;
        const stripLeft = side === -1 ? 0 : road.right;
        const stripWidth = side === -1 ? road.left : (W - road.right);
        if (stripWidth < 24) return false;

        const img = getImageByPath(path);
        if (!img || !img.complete || img.naturalWidth < 1 || img.naturalHeight < 1) return false;
        const ratio = img.naturalWidth / img.naturalHeight;
        const drawWidth = Math.max(8, Math.round(stripWidth * 1));
        const drawHeight = ratio > 0 ? Math.max(8, Math.round(drawWidth / ratio)) : drawWidth;
        const cx = stripLeft + stripWidth * 0.5;
        const sameSide = state.sidewalkDecors.filter((d) => d.side === side);
        const topMostY = sameSide.length > 0 ? Math.min(...sameSide.map((d) => d.y)) : 0;
        const verticalGap = Math.max(18, Math.round(drawHeight * 0.2));
        const entryBuffer = Math.max(56, Math.round(drawHeight * 0.65));
        let y = sameSide.length > 0
          ? topMostY - drawHeight - verticalGap - rand(entryBuffer * 0.35, entryBuffer * 0.9)
          : -drawHeight - rand(entryBuffer * 0.5, entryBuffer * 1.4);
        let guard = 0;
        while (guard < 8) {
          let overlaps = false;
          for (const existing of sameSide) {
            const existingTop = existing.y;
            const existingBottom = existing.y + Math.max(8, Math.round(existing.drawHeight || existing.drawWidth || 48));
            const candidateTop = y;
            const candidateBottom = y + drawHeight;
            const separated = (candidateBottom + verticalGap <= existingTop) || (existingBottom + verticalGap <= candidateTop);
            if (!separated) {
              overlaps = true;
              break;
            }
          }
          if (!overlaps) break;
          y -= drawHeight + verticalGap;
          guard += 1;
        }

        state.sidewalkDecors.push({
          path,
          side,
          cx,
          y,
          drawWidth,
          drawHeight
        });
        state.lastSidewalkAssetPath = path;
        state.lastSidewalkSide = side;
        return true;
      }

      function updateSidewalkDecors(flowPx, dt) {
        if (!Array.isArray(state.sidewalkDecors)) state.sidewalkDecors = [];
        for (const decor of state.sidewalkDecors) {
          decor.y += flowPx;
        }
        state.sidewalkDecors = state.sidewalkDecors.filter((decor) => decor.y < H + Math.max(42, decor.drawHeight || (decor.drawWidth || 42)));
        state.sidewalkSpawnTimer -= dt;
        if (state.sidewalkSpawnTimer <= 0) {
          const spawned = spawnSidewalkDecor();
          state.sidewalkSpawnTimer = spawned ? rand(0.07, 0.16) : 0.05;
        }
      }

      function drawSidewalkDecors() {
        if (!Array.isArray(state.sidewalkDecors) || state.sidewalkDecors.length === 0) return;
        for (const decor of state.sidewalkDecors) {
          const img = getImageByPath(decor.path);
          const drawWidth = Math.max(8, Math.round(decor.drawWidth || 48));
          const drawHeight = Math.max(8, Math.round(decor.drawHeight || drawWidth));
          const x = decor.cx - drawWidth * 0.5;
          const y = decor.y;
          if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, Math.round(x), Math.round(y), drawWidth, drawHeight);
          } else {
            ctx.fillStyle = '#5d696f';
            ctx.fillRect(Math.round(x), Math.round(y), drawWidth, drawHeight);
          }
        }
      }

      function refreshResponsiveLongLayouts() {
        if (!Array.isArray(state.obstacles) || state.obstacles.length === 0) return;
        for (const obs of state.obstacles) {
          if (obs.kind !== 'long') continue;
          const asset = resolveAsset(obs.asset || obs.assetKey);
          if (obs.variant === 'divider') {
            const bodyCount = Array.isArray(obs.segmentKinds)
              ? clamp(obs.segmentKinds.filter((k) => k === 'body').length, 1, 3)
              : 1;
            const layout = buildDividerChainLayout(asset, bodyCount);
            obs.segmentKinds = layout.segmentKinds;
            obs.segmentOffsets = layout.segmentOffsets;
            obs.segmentStepZ = layout.segmentStepZ;
            obs.length = layout.length;
          } else if (obs.variant === 'construction') {
            const bodyCount = Array.isArray(obs.segmentKinds)
              ? clamp(obs.segmentKinds.filter((k) => k === 'body').length, 1, 8)
              : 2;
            const baseSize = road.laneWidth * getAssetLaneFraction() * obstacleViewportScale();
            const chainImages = getAssetConstructionChainImages(asset);
            const bodyDims = chainImages
              ? getSpriteDimensions(chainImages.body.naturalWidth, chainImages.body.naturalHeight, baseSize)
              : { height: Math.max(40, Math.round(baseSize)) };
            const frontDims = chainImages
              ? getSpriteDimensions(chainImages.front.naturalWidth, chainImages.front.naturalHeight, baseSize)
              : { height: bodyDims.height };
            const bodyStep = getLongSegmentStepZFromHeight(bodyDims.height);
            const frontStep = getLongSegmentStepZFromHeight(frontDims.height);
            const targetLength = frontStep + bodyStep * bodyCount;
            const layout = buildConstructionChainLayout(asset, targetLength);
            obs.segmentKinds = layout.segmentKinds;
            obs.segmentOffsets = layout.segmentOffsets;
            obs.segmentStepZ = layout.segmentStepZ;
            obs.length = layout.length;
          }
        }
      }

      function project(laneValue, z, curveShift) {
        const t = clamp(z / road.maxZ, -0.25, 1.35);
        const y = lerp(road.bottomY, road.topY, t);
        const x = W / 2 + laneValue * road.laneWidth * 0.9;
        const scale = clamp(road.laneWidth / 170, 0.55, 1.08);
        return { x: Math.round(x), y: Math.round(y), scale, half: road.width * 0.5 };
      }

      function roundRectPath(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function pickOne(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function pickWeighted(items) {
        let total = 0;
        for (const item of items) total += item.weight;
        let cursor = Math.random() * total;
        for (const item of items) {
          cursor -= item.weight;
          if (cursor <= 0) return item.key;
        }
        return items[items.length - 1].key;
      }

      function randomLane() {
        return pickOne(laneChoices);
      }

      function randomAdjacentLane(lane) {
        const options = [];
        if (lane > -1) options.push(lane - 1);
        if (lane < 1) options.push(lane + 1);
        return pickOne(options);
      }

      function rangeVal(range) {
        return rand(range[0], range[1]);
      }

      function randInt(min, max) {
        return Math.floor(rand(min, max + 1));
      }

      function resolveAssetDefinition(assetKey) {
        return obstacleAssets[assetKey] || obstacleAssets.fallback;
      }

      function materializeAssetVariant(assetKey, forcedIndex) {
        const base = resolveAssetDefinition(assetKey);
        const rawVariants = Array.isArray(base.spriteVersions) ? base.spriteVersions.slice(0, 3) : [];
        const variants = rawVariants.length > 0 ? rawVariants : [{}];
        const idx = forcedIndex == null
          ? Math.floor(Math.random() * variants.length)
          : clamp(forcedIndex, 0, variants.length - 1);
        const variant = variants[idx] || {};
        const merged = { ...base, ...variant, spriteVariantIndex: idx, spriteVariantCount: variants.length };
        delete merged.spriteVersions;
        return merged;
      }

      function resolveAsset(assetRef) {
        if (assetRef && typeof assetRef === 'object') return assetRef;
        if (typeof assetRef === 'string') return materializeAssetVariant(assetRef, 0);
        return materializeAssetVariant('fallback', 0);
      }

      function getSpriteDimensions(rawW, rawH, baseSize) {
        const size = Math.max(1, Math.round(baseSize));
        const w = rawW > 0 ? rawW : 32;
        const h = rawH > 0 ? rawH : 32;
        const ratio = w / h;
        if (Number.isFinite(ratio) && ratio >= 1) {
          return { width: size, height: Math.max(1, Math.round(size / ratio)) };
        }
        if (Number.isFinite(ratio) && ratio > 0) {
          return { width: Math.max(1, Math.round(size * ratio)), height: size };
        }
        return { width: size, height: size };
      }

      function getAssetDrawDimensions(asset, baseSize, image) {
        const rawW = image && image.naturalWidth ? image.naturalWidth : (asset.width || 32);
        const rawH = image && image.naturalHeight ? image.naturalHeight : (asset.height || 32);
        const sizeMul = Number.isFinite(asset.sizeMul) ? Math.max(0.2, asset.sizeMul) : 1;
        return getSpriteDimensions(rawW, rawH, baseSize * sizeMul);
      }

      function getImageByPath(path) {
        if (!path) return null;
        if (!imageCache.has(path)) {
          const img = new Image();
          img.src = path;
          imageCache.set(path, img);
        }
        const cached = imageCache.get(path);
        return cached.complete && cached.naturalWidth > 0 && cached.naturalHeight > 0 ? cached : null;
      }

      function getAssetImage(asset) {
        return getImageByPath(asset.image);
      }

      function getAssetChainImages(asset) {
        if (!asset.chain) return null;
        const bottom = getImageByPath(asset.chain.bottom);
        const body = getImageByPath(asset.chain.body);
        const top = getImageByPath(asset.chain.top);
        if (!bottom || !body || !top) return null;
        if (bottom.naturalWidth < 1 || body.naturalWidth < 1 || top.naturalWidth < 1) return null;
        return { bottom, body, top };
      }

      function getAssetConstructionChainImages(asset) {
        if (!asset.chain) return null;
        const front = getImageByPath(asset.chain.front);
        const body = getImageByPath(asset.chain.body);
        if (!front || !body) return null;
        if (front.naturalWidth < 1 || body.naturalWidth < 1) return null;
        return { front, body };
      }

      function drawAssetLabel(asset, w, h, scale) {
        if (!asset.label || scale < 0.35) return;
        ctx.fillStyle = 'rgba(14, 20, 28, 0.78)';
        roundRectPath(-w * 0.28, -h * 0.52, w * 0.56, h * 0.24, 4 * scale);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 247, 228, 0.95)';
        ctx.font = `${Math.max(8, 13 * scale)}px "VT323", monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(asset.label, 0, -h * 0.4);
      }

      function drawAssetSprite(asset, baseSize, scale, fallbackDraw) {
        const img = getAssetImage(asset);
        const dims = getAssetDrawDimensions(asset, baseSize, img);
        if (img) {
          ctx.drawImage(img, Math.round(-dims.width * 0.5), Math.round(-dims.height), dims.width, dims.height);
        } else {
          fallbackDraw(dims.width, dims.height);
          drawAssetLabel(asset, dims.width, dims.height, scale);
        }
        return dims;
      }

      function obstacleViewportScale() {
        // Keep desktop look, shrink obstacles on smaller viewports.
        return clamp(Math.min(W / 1280, H / 820), 0.62, 1);
      }

      function loadHighScore() {
        try {
          const raw = sessionStorage.getItem(HI_SCORE_KEY);
          const parsed = Number.parseInt(raw || '0', 10);
          return Number.isFinite(parsed) ? Math.max(0, parsed) : 0;
        } catch (_) {
          return 0;
        }
      }

      function saveHighScore(value) {
        try {
          sessionStorage.setItem(HI_SCORE_KEY, String(value));
        } catch (_) {
          // Ignore storage errors; game still functions without persistence.
        }
      }

      function getDifficultyProfile(distance) {
        const progress = clamp(distance / 3600, 0, 1);
        return {
          progress,
          spawnMin: lerp(1.22, 0.32, progress),
          spawnMax: lerp(1.72, 0.62, progress),
          speedFactor: lerp(1.08, 2.05, progress),
          overlapGap: lerp(220, 125, progress)
        };
      }

      function mechanicWeightScale(mechanicKey, progress) {
        if (mechanicKey === 'static') return lerp(1.45, 0.85, progress);
        if (mechanicKey === 'dividerLong') return lerp(1.1, 0.9, progress);
        if (mechanicKey === 'constructionLong') return lerp(0.85, 1.1, progress);
        if (mechanicKey === 'crossingFast') return lerp(0.22, 1.25, progress);
        if (mechanicKey === 'crossingHeavy') return lerp(0.15, 1.05, progress);
        if (mechanicKey === 'crossingReverse') return lerp(0.12, 1.02, progress);
        if (mechanicKey === 'switcher') return lerp(0.25, 1.35, progress);
        return 1;
      }

      function pickMechanicByDifficulty(profile, excludedKey) {
        const weighted = [];
        for (const item of mechanicWeights) {
          if (item.key === 'dividerLong' && isDividerSpawnBlocked()) continue;
          weighted.push({
            key: item.key,
            weight: item.weight * mechanicWeightScale(item.key, profile.progress)
          });
        }
        if (weighted.length === 0) return null;
        if (excludedKey && weighted.length > 1) {
          const filtered = weighted.filter((item) => item.key !== excludedKey);
          if (filtered.length > 0) return pickWeighted(filtered);
        }
        return pickWeighted(weighted);
      }

      function pickAssetAvoidRepeat(assetKeys, excludedKey) {
        if (!Array.isArray(assetKeys) || assetKeys.length === 0) return null;
        if (!excludedKey || assetKeys.length <= 1) return pickOne(assetKeys);
        const filtered = assetKeys.filter((key) => key !== excludedKey);
        return pickOne(filtered.length > 0 ? filtered : assetKeys);
      }

      function laneSpanAtSpawn(obstacle) {
        if (obstacle.kind === 'crossing') {
          const spread = obstacle.startSpread || 1.4;
          return { min: -spread, max: spread };
        }
        if (obstacle.kind === 'switcher') {
          const start = Math.min(obstacle.lane, obstacle.target);
          const end = Math.max(obstacle.lane, obstacle.target);
          return { min: start - obstacle.hitWidth, max: end + obstacle.hitWidth };
        }
        return {
          min: obstacle.lane - obstacle.hitWidth,
          max: obstacle.lane + obstacle.hitWidth
        };
      }

      function zSpanAtSpawn(obstacle) {
        if (obstacle.kind === 'long') {
          return {
            min: obstacle.z - 18,
            max: obstacle.z + obstacle.length + 18
          };
        }
        return {
          min: obstacle.z - 24,
          max: obstacle.z + 24
        };
      }

      function laneSpanForPowerup(powerup) {
        return {
          min: powerup.lane - 0.36,
          max: powerup.lane + 0.36
        };
      }

      function zSpanForPowerup(powerup) {
        return {
          min: powerup.z - 28,
          max: powerup.z + 28
        };
      }

      function buildDividerChainLayout(asset, bodyCount) {
        const clampedBodies = clamp(Math.round(bodyCount || 1), 1, 3);
        const segmentKinds = ['bottom'];
        for (let i = 0; i < clampedBodies; i++) segmentKinds.push('body');
        segmentKinds.push('top');

        const baseSize = road.laneWidth * getAssetLaneFraction() * obstacleViewportScale();
        const chainImages = getAssetChainImages(asset);
        const pixelsPerZ = Math.max(0.001, (road.bottomY - road.topY) / road.maxZ);
        const source = {
          bottom: chainImages ? chainImages.bottom : null,
          body: chainImages ? chainImages.body : null,
          top: chainImages ? chainImages.top : null
        };
        const pieceHeightZ = {};
        for (const piece of ['bottom', 'body', 'top']) {
          const img = source[piece];
          const rawW = img ? img.naturalWidth : 32;
          const rawH = img ? img.naturalHeight : 32;
          const dims = getSpriteDimensions(rawW, rawH, baseSize);
          // Divider pieces should never overlap; use ceil spacing from exact rendered height.
          pieceHeightZ[piece] = clamp(Math.ceil(Math.max(1, dims.height) / pixelsPerZ), 56, 320);
        }

        const segmentOffsets = [];
        let cursor = 0;
        let segmentStepZ = 64;
        for (const piece of segmentKinds) {
          segmentOffsets.push(cursor);
          const step = pieceHeightZ[piece] || pieceHeightZ.body || 64;
          segmentStepZ = Math.max(segmentStepZ, step);
          cursor += step;
        }
        return {
          segmentKinds,
          segmentOffsets,
          segmentStepZ,
          length: cursor
        };
      }

      function buildConstructionChainLayout(asset, targetLength) {
        const baseSize = road.laneWidth * getAssetLaneFraction() * obstacleViewportScale();
        const chainImages = getAssetConstructionChainImages(asset);
        const pixelsPerZ = Math.max(0.001, (road.bottomY - road.topY) / road.maxZ);
        const source = {
          front: chainImages ? chainImages.front : null,
          body: chainImages ? chainImages.body : null
        };
        const pieceHeightZ = {};
        for (const piece of ['front', 'body']) {
          const img = source[piece];
          const rawW = img ? img.naturalWidth : 32;
          const rawH = img ? img.naturalHeight : 32;
          const dims = getSpriteDimensions(rawW, rawH, baseSize);
          const stitchedHeightPx = Math.max(1, dims.height - 1);
          pieceHeightZ[piece] = clamp(Math.round((stitchedHeightPx * 0.99) / pixelsPerZ), 40, 320);
        }

        const frontStep = pieceHeightZ.front || 64;
        const bodyStep = pieceHeightZ.body || 64;
        const desiredLength = Math.max(frontStep + bodyStep, Math.round(targetLength || 200));
        const bodyCount = clamp(Math.round((desiredLength - frontStep) / bodyStep), 1, 8);
        const segmentKinds = ['front'];
        for (let i = 0; i < bodyCount; i++) segmentKinds.push('body');

        const segmentOffsets = [];
        let cursor = 0;
        let segmentStepZ = 64;
        for (const piece of segmentKinds) {
          segmentOffsets.push(cursor);
          const step = piece === 'front' ? frontStep : bodyStep;
          segmentStepZ = Math.max(segmentStepZ, step);
          cursor += step;
        }
        return {
          segmentKinds,
          segmentOffsets,
          segmentStepZ,
          length: cursor
        };
      }

      function getLongSegmentStepZFromHeight(heightPx) {
        const pixelsPerZ = Math.max(0.001, (road.bottomY - road.topY) / road.maxZ);
        const stitchedHeightPx = Math.max(1, heightPx - 1);
        return clamp(Math.round((stitchedHeightPx * 0.99) / pixelsPerZ), 40, 320);
      }

      function isDividerSpawnBlocked() {
        const dividerCfg = obstacleMechanics.dividerLong;
        const spawnGateZ = road.maxZ + dividerCfg.spawnZ[0];
        for (const obs of state.obstacles) {
          if (obs.kind !== 'long' || obs.variant !== 'divider') continue;
          const tailZ = obs.z + obs.length;
          if (tailZ > spawnGateZ) return true;
        }
        return false;
      }

      function maybeSpawnPowerup(profile) {
        if (Math.random() >= 0.35) return;
        const p = pickOne(powerupTypes);
        const powerup = {
          kind: 'power',
          lane: randomLane(),
          z: road.maxZ + rand(60, 140),
          type: p,
          bob: rand(0, Math.PI * 2)
        };
        if (canPlacePowerup(powerup, profile)) {
          state.powerups.push(powerup);
        }
      }

      function spansOverlap(a, b) {
        return !(a.max < b.min || b.max < a.min);
      }

      function zSpansOverlap(a, b, gap) {
        return !(a.max + gap < b.min || b.max + gap < a.min);
      }

      function canPlaceObstacle(candidate, profile) {
        const candidateSpan = laneSpanAtSpawn(candidate);
        const candidateZ = zSpanAtSpawn(candidate);
        const baseGap = profile.overlapGap + (candidate.kind === 'long' ? 55 : 0);
        const longIsolationGap = Math.max(170, profile.overlapGap * 1.05);
        for (const existing of state.obstacles) {
          const existingFrontZ = existing.kind === 'long' ? (existing.z + existing.length) : existing.z;
          if (existingFrontZ < road.maxZ - 250) continue;
          const existingZ = zSpanAtSpawn(existing);
          const candidateIsLong = candidate.kind === 'long';
          const existingIsLong = existing.kind === 'long';

          // Keep long obstacles in isolated spawn windows so players always get vertical escape room.
          if ((candidateIsLong || existingIsLong)
            && !(candidateIsLong && existingIsLong && candidate.variant === 'divider' && existing.variant === 'divider')
            && zSpansOverlap(candidateZ, existingZ, longIsolationGap)) {
            return false;
          }

          if (candidate.kind === 'long' && existing.kind === 'long' && candidate.variant === 'divider' && existing.variant === 'divider') {
            const safeGap = Math.max(40, candidate.segmentStepZ || 0, existing.segmentStepZ || 0);
            const candidateTail = candidate.z + candidate.length;
            const existingTail = existing.z + existing.length;
            const separated = candidate.z >= existingTail + safeGap || existing.z >= candidateTail + safeGap;
            if (!separated) return false;
            continue;
          }
          if (candidate.kind === 'long' && existing.kind === 'long' && existing.z > road.maxZ - 180) {
            return false;
          }

          const dynamicGap = baseGap + (existing.kind === 'long' ? 50 : 0) + (existing.kind === 'crossing' || candidate.kind === 'crossing' ? 36 : 0);
          if (!zSpansOverlap(candidateZ, existingZ, dynamicGap)) continue;

          const existingSpan = laneSpanAtSpawn(existing);
          if (spansOverlap(candidateSpan, existingSpan)) return false;
        }

        for (const powerup of state.powerups) {
          const dynamicGap = Math.max(110, profile.overlapGap * 0.65);
          if (!zSpansOverlap(candidateZ, zSpanForPowerup(powerup), dynamicGap)) continue;
          if (spansOverlap(candidateSpan, laneSpanForPowerup(powerup))) return false;
        }
        return true;
      }

      function canPlacePowerup(candidate, profile) {
        const candidateSpan = laneSpanForPowerup(candidate);
        const candidateZ = zSpanForPowerup(candidate);

        for (const existing of state.obstacles) {
          const dynamicGap = Math.max(120, profile.overlapGap * 0.75) + (existing.kind === 'long' ? 36 : 0);
          if (!zSpansOverlap(candidateZ, zSpanAtSpawn(existing), dynamicGap)) continue;
          if (spansOverlap(candidateSpan, laneSpanAtSpawn(existing))) return false;
        }

        for (const existing of state.powerups) {
          const dynamicGap = 96;
          if (!zSpansOverlap(candidateZ, zSpanForPowerup(existing), dynamicGap)) continue;
          if (spansOverlap(candidateSpan, laneSpanForPowerup(existing))) return false;
        }
        return true;
      }

      function startGame() {
        const previousMode = state.mode;
        ensureBgmPlaying();
        if (previousMode === 'ready' && playerSprites.length > 1) {
          state.playerSpriteIndex = Math.random() < 0.5 ? 0 : 1;
        }
        state.mode = 'running';
        state.distance = 0;
        state.score = 0;
        state.bonusScore = 0;
        state.multiplier = 1;
        state.multiplierTimer = 0;
        state.speedBoost = 1;
        state.lane = 0;
        state.targetLane = 0;
        state.laneVelocity = 0;
        state.obstacles = [];
        state.powerups = [];
        state.sidewalkDecors = [];
        state.sidewalkSpawnTimer = 0.04;
        state.lastSpawnMechanicKey = null;
        state.lastSpawnAssetKey = null;
        state.spawnTimer = 1.4;
        state.crashFx.active = false;
        state.crashFx.flashTimer = 0;
        state.crashFx.startedAt = 0;
        if (previousMode === 'over' && playerSprites.length > 1) {
          state.playerSpriteIndex = (state.playerSpriteIndex + 1) % playerSprites.length;
        }
        setPauseButtonState(false);
        if (dashboardEl) dashboardEl.style.display = 'block';
        introEl.style.display = 'none';
        bannerEl.style.display = 'none';
        gameoverEl.classList.remove('show');
      }

      function gameOver(reason) {
        if (state.mode === 'over') return;
        state.mode = 'over';
        bgm.playbackRate = 1;
        playSfx('gameOver');
        setPauseButtonState(false);
        state.lastTip = tips[reason] || reason || state.lastTip;
        state.crashFx.active = true;
        state.crashFx.lane = state.lane;
        state.crashFx.flashTimer = 0.18;
        state.crashFx.startedAt = state.time;
        tipEl.textContent = state.lastTip;
        gameoverEl.classList.add('show');
        introEl.style.display = 'none';
        bannerEl.style.display = 'none';
      }

      function handleInput(dir) {
        if (state.mode === 'ready') {
          startGame();
          return;
        }
        if (state.mode === 'over') {
          startGame();
          return;
        }
        if (state.mode === 'paused') {
          return;
        }
        state.targetLane = clamp(state.targetLane + dir, -1, 1);
      }

      function spawnObstacle(profile, forcedMechanicKey, options) {
        const opts = options || {};
        const mechanicKey = forcedMechanicKey || pickMechanicByDifficulty(profile, state.lastSpawnMechanicKey);
        const cfg = obstacleMechanics[mechanicKey];
        if (!cfg) return false;
        if (cfg.kind === 'long' && cfg.variant === 'divider' && !opts.ignoreDividerGate && isDividerSpawnBlocked()) {
          return false;
        }

        const lane = cfg.laneRule === 'center' ? 0 : randomLane();
        const assetKey = pickAssetAvoidRepeat(cfg.assets, opts.ignoreRepeat ? null : state.lastSpawnAssetKey);
        if (!assetKey) return false;
        const obstacle = {
          mechanicKey,
          kind: cfg.kind,
          tipKey: cfg.tipKey,
          tip: '',
          lane,
          z: road.maxZ + rangeVal(cfg.spawnZ),
          hitWidth: cfg.hitWidth,
          assetKey,
          asset: materializeAssetVariant(assetKey)
        };
        obstacle.tip = obstacle.asset && obstacle.asset.tip ? obstacle.asset.tip : '';

        if (cfg.kind === 'long') {
          obstacle.variant = cfg.variant;
          if (cfg.variant === 'divider') {
            const layout = buildDividerChainLayout(obstacle.asset, randInt(1, 3));
            obstacle.segmentKinds = layout.segmentKinds;
            obstacle.segmentOffsets = layout.segmentOffsets;
            obstacle.segmentStepZ = layout.segmentStepZ;
            obstacle.length = layout.length;
          } else if (cfg.variant === 'construction') {
            const layout = buildConstructionChainLayout(obstacle.asset, rangeVal(cfg.length));
            obstacle.segmentKinds = layout.segmentKinds;
            obstacle.segmentOffsets = layout.segmentOffsets;
            obstacle.segmentStepZ = layout.segmentStepZ;
            obstacle.length = layout.length;
          } else {
            obstacle.length = rangeVal(cfg.length);
          }
        }

        if (cfg.kind === 'crossing') {
          obstacle.variant = cfg.variant;
          const forcedDir = obstacle.asset && (obstacle.asset.moveDir === -1 || obstacle.asset.moveDir === 1)
            ? obstacle.asset.moveDir
            : 0;
          obstacle.dir = forcedDir || (Math.random() < 0.5 ? -1 : 1);
          obstacle.cross = obstacle.dir === -1 ? 1 : 0;
          obstacle.speed = rangeVal(cfg.speed) * lerp(0.88, 1.08, profile.progress);
          obstacle.startSpread = cfg.startSpread;
        }

        if (cfg.kind === 'switcher') {
          obstacle.target = randomAdjacentLane(lane);
          obstacle.phase = 'signal';
          const nearPlayerStartZ = rand(150, 260);
          const spawnEdgeStartZ = obstacle.z + rand(20, 180);
          obstacle.signalStartZ = rand(nearPlayerStartZ, spawnEdgeStartZ);
          obstacle.signalDuration = rangeVal(cfg.signalDuration) * lerp(1.2, 0.86, profile.progress);
          obstacle.signalElapsed = 0;
          obstacle.switchProgress = 0;
          obstacle.switchDuration = rangeVal(cfg.switchDuration) * lerp(1.15, 0.82, profile.progress);
        }

        if (!opts.ignorePlacement && !canPlaceObstacle(obstacle, profile)) {
          return false;
        }

        state.obstacles.push(obstacle);
        state.lastSpawnMechanicKey = mechanicKey;
        state.lastSpawnAssetKey = assetKey;
        maybeSpawnPowerup(profile);
        return true;
      }

      function update(dt) {
        state.time += dt;
        if (state.mode === 'ready') {
          const introTravel = state.speed * 1.1 * dt;
          state.introDistance += introTravel;
          updateSidewalkDecors(introTravel * 0.38, dt);
          updateBgmPlayback(dt);
          return;
        }
        if (state.mode === 'over') {
          if (state.crashFx.flashTimer > 0) {
            state.crashFx.flashTimer = Math.max(0, state.crashFx.flashTimer - dt);
          }
          updateBgmPlayback(dt);
          return;
        }
        if (state.mode !== 'running') {
          updateBgmPlayback(dt);
          return;
        }

        const profile = getDifficultyProfile(state.distance);
        const boostedSpeedFactor = profile.speedFactor * state.speedBoost;
        const travel = state.speed * boostedSpeedFactor * dt;
        state.distance += travel;
        updateSidewalkDecors(travel * 0.38, dt);
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          const burstCount = 1 + (Math.random() < profile.progress * 0.7 ? 1 : 0);
          let spawnedAny = false;
          for (let b = 0; b < burstCount; b++) {
            let spawned = false;
            for (let i = 0; i < 4 && !spawned; i++) {
              spawned = spawnObstacle(profile);
            }
            spawnedAny = spawnedAny || spawned;
          }
          state.spawnTimer = rand(profile.spawnMin, profile.spawnMax);
          if (!spawnedAny) state.spawnTimer += 0.25;
        }

        const laneEase = 1 - Math.exp(-dt * 12);
        state.lane = lerp(state.lane, state.targetLane, laneEase);

        if (state.multiplierTimer > 0) {
          state.multiplierTimer -= dt;
          if (state.multiplierTimer <= 0) {
            state.multiplier = 1;
            state.multiplierTimer = 0;
            powerEl.textContent = '';
          }
        }
        if (state.multiplierTimer > 0) {
          state.speedBoost = 2;
        } else if (state.speedBoost > 1) {
          const slowdown = 1 - Math.exp(-dt * 3.2);
          state.speedBoost = lerp(state.speedBoost, 1, slowdown);
          if (Math.abs(state.speedBoost - 1) < 0.02) state.speedBoost = 1;
        }

        for (const obs of state.obstacles) {
          obs.z -= travel;
          if (obs.kind === 'crossing') {
            obs.cross = clamp(obs.cross + obs.speed * dt * obs.dir, 0, 1);
          }
          if (obs.kind === 'switcher') {
            if (obs.phase === 'signal' && obs.z < obs.signalStartZ) {
              obs.signalElapsed += dt;
              if (obs.signalElapsed >= obs.signalDuration) {
                obs.phase = 'switch';
              }
              // Guarantee lane change starts before the obstacle reaches player proximity.
              if (obs.z < 180) {
                obs.phase = 'switch';
              }
            } else if (obs.phase === 'switch') {
              obs.switchProgress = clamp(obs.switchProgress + dt / obs.switchDuration, 0, 1);
            }
          }
        }

        for (const pow of state.powerups) {
          pow.z -= travel;
          pow.bob += dt * 8.2;
        }

        const collisionZ = 24;
        const visibleCollisionMinZ = 8;
        const despawnZ = -40;
        const remaining = [];
        for (const obs of state.obstacles) {
          const laneValue = getObstacleLane(obs);
          const laneHit = Math.abs(state.lane - laneValue) < obs.hitWidth;
          const stillVisibleForCollision = obs.kind === 'long'
            ? longObstacleHasVisibleSegment(obs, visibleCollisionMinZ, getMaxVisibleZ())
            : obs.z >= visibleCollisionMinZ;
          if (stillVisibleForCollision) {
            if (obs.kind === 'long') {
              const overlapsPlayerSlice = obs.z <= collisionZ && (obs.z + obs.length) >= collisionZ;
              if (laneHit && overlapsPlayerSlice) {
                gameOver(obs.tip || obs.tipKey);
              }
            } else if (obs.z < collisionZ && obs.z > -12 && laneHit) {
              gameOver(obs.tip || obs.tipKey);
            }
          }

          if (obs.kind === 'long') {
            if ((obs.z + obs.length) > despawnZ) remaining.push(obs);
          } else if (obs.z > despawnZ) {
            remaining.push(obs);
          }
        }
        state.obstacles = remaining;

        const remainingPower = [];
        for (const pow of state.powerups) {
          const laneHit = Math.abs(state.lane - pow.lane) < 0.35;
          if (pow.z < 26 && pow.z > -12 && laneHit) {
            playSfx('boost');
            state.multiplier = 2;
            state.multiplierTimer = 5;
            state.speedBoost = 2;
            state.bonusScore += 150;
            powerEl.textContent = pow.type.label + ' SPEED x2 / SCORE x2';
          } else if (pow.z > despawnZ) {
            remainingPower.push(pow);
          }
        }
        state.powerups = remainingPower;

        state.score = Math.floor(state.distance * 0.6 * state.multiplier + state.bonusScore);
        if (state.score > state.highScore) {
          state.highScore = state.score;
          saveHighScore(state.highScore);
        }
        updateBgmPlayback(dt);
        updateHUD(profile.progress, state.speedBoost);
      }

      function updateHUD(progress, speedBoost) {
        distanceEl.textContent = `${Math.floor(state.distance)} m`;
        scoreEl.textContent = state.score;
        highScoreEl.textContent = state.highScore;
        const baseDisplaySpeed = Math.round(lerp(30, 40, clamp(progress, 0, 1)));
        const boostedDisplaySpeed = baseDisplaySpeed + Math.round((Math.max(1, speedBoost) - 1) * 30);
        speedEl.textContent = `${Math.min(70, boostedDisplaySpeed)} km/h`;
        if (dashboardEl) {
          dashboardEl.classList.toggle('boosted', state.multiplierTimer > 0 || state.speedBoost > 1.01);
        }
      }

      function getObstacleLane(obs) {
        if (obs.kind === 'crossing') {
          const spread = obs.startSpread || 1.4;
          return lerp(-spread, spread, obs.cross);
        }
        if (obs.kind === 'switcher') {
          if (obs.phase !== 'switch') return obs.lane;
          return lerp(obs.lane, obs.target, easeInOut(obs.switchProgress));
        }
        return obs.lane;
      }

      function getMinVisibleZ() {
        return 8;
      }

      function getMaxVisibleZ() {
        return road.maxZ + Math.max(220, Math.round(road.maxZ * 0.55));
      }

      function longObstacleHasVisibleSegment(obs, minZ, maxZ) {
        const clipMinZ = minZ == null ? getMinVisibleZ() : minZ;
        const clipMaxZ = maxZ == null ? getMaxVisibleZ() : maxZ;
        if (Array.isArray(obs.segmentOffsets) && obs.segmentOffsets.length > 0) {
          for (const offset of obs.segmentOffsets) {
            const segmentZ = obs.z + offset;
            if (segmentZ >= clipMinZ && segmentZ <= clipMaxZ) return true;
          }
          return false;
        }
        const tailZ = obs.z + obs.length;
        return tailZ >= clipMinZ && obs.z <= clipMaxZ;
      }

      function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        drawSky();
        const curveShift = 0;
        drawRoad(curveShift);
        drawObjects(curveShift);
        drawPlayer(curveShift);
        drawCrashEffects(curveShift);
      }

      function drawSky() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#f8b18a');
        grad.addColorStop(0.45, '#9dd7ff');
        grad.addColorStop(1, '#2c3f6d');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        const scrollDistance = state.mode === 'ready' ? state.introDistance : state.distance;
        drawSidewalkTiles(scrollDistance);
        drawSidewalkDecors();

        ctx.fillStyle = '#182438';
        for (const b of skyline) {
          ctx.fillRect(b.x, road.topY - b.h - 24, b.w, b.h + 24);
        }
      }
        //road color  
      function drawRoad(curveShift) {
        ctx.fillStyle = '#343434';
        ctx.fillRect(road.left, road.topY, road.width, road.bottomY - road.topY);
        const scrollDistance = state.mode === 'ready' ? state.introDistance : state.distance;
        drawRoadDecals(scrollDistance);

        ctx.strokeStyle = 'rgba(0, 0, 0, 1)';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(road.left, road.topY);
        ctx.lineTo(road.left, road.bottomY);
        ctx.moveTo(road.right, road.topY);
        ctx.lineTo(road.right, road.bottomY);
        ctx.stroke();

        const laneX = [road.left + road.laneWidth, road.left + road.laneWidth * 2];
        const dashSize = Math.max(18, Math.round(road.laneWidth * 0.36));
        const gapSize = Math.max(18, Math.round(road.laneWidth * 0.36));
        const pattern = dashSize + gapSize;
        const flow = (scrollDistance * 0.38) % pattern;
        ctx.save();
        //divider stroke color
        ctx.strokeStyle = 'rgba(175, 162, 159, 0.6)';
        ctx.lineWidth = 25;
        ctx.setLineDash([dashSize, gapSize]);
        ctx.lineDashOffset = -flow;
        for (const x of laneX) {
          ctx.beginPath();
          ctx.moveTo(Math.round(x), road.topY);
          ctx.lineTo(Math.round(x), road.bottomY);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawObjects(curveShift) {
        const all = [];
        for (const obs of state.obstacles) all.push({ z: obs.z, obj: obs });
        for (const pow of state.powerups) all.push({ z: pow.z, obj: pow });
        all.sort((a, b) => b.z - a.z);

        for (const item of all) {
          const obj = item.obj;
          if (obj.kind === 'long') {
            if ((obj.z + obj.length) < getMinVisibleZ()) continue;
          } else if (item.z < getMinVisibleZ()) {
            continue;
          }
          if (obj.kind === 'power') {
            drawPowerup(obj, curveShift);
          } else {
            drawObstacleByMechanic(obj, curveShift);
          }
        }
      }

      function drawObstacleByMechanic(obs, curveShift) {
        if (obs.kind === 'long') {
          drawLongObstacle(obs, curveShift);
        } else {
          drawObstacle(obs, curveShift);
        }
        if (showColliderDebug) drawObstacleCollider(obs, curveShift);
      }

      function drawObstacle(obs, curveShift) {
        const laneValue = getObstacleLane(obs);
        const p = project(laneValue, obs.z, curveShift);
        const asset = resolveAsset(obs.asset || obs.assetKey);
        const responsiveScale = obstacleViewportScale();
        const baseSize = road.laneWidth * getAssetLaneFraction() * responsiveScale;
        const shouldFlipForDirection = obs.kind === 'crossing'
          && (asset.facing === -1 || asset.facing === 1)
          && obs.dir !== asset.facing;

        ctx.save();
        ctx.translate(Math.round(p.x), Math.round(p.y));
        if (shouldFlipForDirection) ctx.scale(-1, 1);
        const dims = drawAssetSprite(asset, baseSize, p.scale, (drawW, drawH) => {
          drawObstaclePlaceholder(asset, drawW, drawH, p.scale);
        });
        const width = dims.width;
        const height = dims.height;

        if (obs.kind === 'switcher' && (obs.phase === 'signal' || obs.switchProgress < 1)) {
          const blinkOn = Math.sin(state.time * 14) > 0;
          const blinkColor = blinkOn ? '#ffd977' : 'rgba(255, 217, 119, 0.25)';
          const side = obs.target > obs.lane ? 1 : -1;
          ctx.fillStyle = blinkColor;
          roundRectPath(side * width * 0.35, -height * 0.72, width * 0.2, height * 0.18, 2 * p.scale);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawLongSpriteAtZ(image, dims, laneValue, z, curveShift) {
        if (z < getMinVisibleZ() || z > getMaxVisibleZ()) return;
        const p = project(laneValue, z, curveShift);
        ctx.drawImage(
          image,
          Math.round(p.x - dims.width * 0.5),
          Math.round(p.y - dims.height),
          dims.width,
          dims.height
        );
      }

      function drawDividerChain(obs, asset, laneValue, curveShift, baseSize) {
        const chainImages = getAssetChainImages(asset);
        if (!chainImages) return false;

        const bottomDims = getSpriteDimensions(chainImages.bottom.naturalWidth, chainImages.bottom.naturalHeight, baseSize);
        const bodyDims = getSpriteDimensions(chainImages.body.naturalWidth, chainImages.body.naturalHeight, baseSize);
        const topDims = getSpriteDimensions(chainImages.top.naturalWidth, chainImages.top.naturalHeight, baseSize);
        const fallbackLayout = buildDividerChainLayout(asset, 1);
        const segmentKinds = Array.isArray(obs.segmentKinds) && obs.segmentKinds.length > 1
          ? obs.segmentKinds
          : fallbackLayout.segmentKinds;
        const segmentOffsets = Array.isArray(obs.segmentOffsets) && obs.segmentOffsets.length === segmentKinds.length
          ? obs.segmentOffsets
          : fallbackLayout.segmentOffsets;

        // Draw far -> near, then force the top cap last so it never gets hidden by body tiles.
        for (let i = segmentKinds.length - 1; i >= 0; i--) {
          const segmentKind = segmentKinds[i];
          if (segmentKind === 'top') continue;
          const segmentZ = obs.z + segmentOffsets[i];
          if (segmentKind === 'bottom') {
            drawLongSpriteAtZ(chainImages.bottom, bottomDims, laneValue, segmentZ, curveShift);
          } else {
            drawLongSpriteAtZ(chainImages.body, bodyDims, laneValue, segmentZ, curveShift);
          }
        }
        for (let i = segmentKinds.length - 1; i >= 0; i--) {
          if (segmentKinds[i] !== 'top') continue;
          const segmentZ = obs.z + segmentOffsets[i];
          drawLongSpriteAtZ(chainImages.top, topDims, laneValue, segmentZ, curveShift);
        }
        return true;
      }

      function drawConstructionChain(obs, asset, laneValue, curveShift, baseSize) {
        const chainImages = getAssetConstructionChainImages(asset);
        if (!chainImages) return false;

        const frontDims = getSpriteDimensions(chainImages.front.naturalWidth, chainImages.front.naturalHeight, baseSize);
        const bodyDims = getSpriteDimensions(chainImages.body.naturalWidth, chainImages.body.naturalHeight, baseSize);
        const fallbackLayout = buildConstructionChainLayout(asset, 200);
        const segmentKinds = Array.isArray(obs.segmentKinds) && obs.segmentKinds.length > 1
          ? obs.segmentKinds
          : fallbackLayout.segmentKinds;
        const segmentOffsets = Array.isArray(obs.segmentOffsets) && obs.segmentOffsets.length === segmentKinds.length
          ? obs.segmentOffsets
          : fallbackLayout.segmentOffsets;

        // Draw far -> near so the front cap stays visually on top.
        for (let i = segmentKinds.length - 1; i >= 0; i--) {
          const segmentKind = segmentKinds[i];
          const segmentZ = obs.z + segmentOffsets[i];
          if (segmentKind === 'front') {
            drawLongSpriteAtZ(chainImages.front, frontDims, laneValue, segmentZ, curveShift);
          } else {
            drawLongSpriteAtZ(chainImages.body, bodyDims, laneValue, segmentZ, curveShift);
          }
        }
        return true;
      }

      function drawLongObstacle(obs, curveShift) {
        const laneValue = obs.lane;
        const asset = resolveAsset(obs.asset || obs.assetKey);
        const image = getAssetImage(asset);
        const responsiveScale = obstacleViewportScale();
        const baseSize = road.laneWidth * getAssetLaneFraction() * responsiveScale;

        if (obs.variant === 'divider' && drawDividerChain(obs, asset, laneValue, curveShift, baseSize)) {
          return;
        }
        if (obs.variant === 'construction' && drawConstructionChain(obs, asset, laneValue, curveShift, baseSize)) {
          return;
        }

        if (image) {
          const dims = getAssetDrawDimensions(asset, baseSize, image);
          const segmentStepZ = getLongSegmentStepZFromHeight(dims.height);
          const endZ = obs.z + obs.length;
          let z = obs.z;
          while (z < getMinVisibleZ()) z += segmentStepZ;
          let drewSegment = false;
          for (; z <= endZ; z += segmentStepZ) {
            drawLongSpriteAtZ(image, dims, laneValue, z, curveShift);
            drewSegment = true;
          }
          if (!drewSegment && endZ >= getMinVisibleZ() && endZ <= getMaxVisibleZ()) {
            drawLongSpriteAtZ(image, dims, laneValue, endZ, curveShift);
          }
          return;
        }

        const p1 = project(laneValue, obs.z, curveShift);
        const p2 = project(laneValue, obs.z + obs.length, curveShift);
        const laneUnit = road.laneWidth * responsiveScale;
        const width1 = (obs.variant === 'divider' ? laneUnit * 0.17 : laneUnit * 0.52) * p1.scale;
        const width2 = (obs.variant === 'divider' ? laneUnit * 0.17 : laneUnit * 0.52) * p2.scale;

        ctx.fillStyle = asset.body || '#f65a4b';
        ctx.beginPath();
        ctx.moveTo(p1.x - width1, p1.y);
        ctx.lineTo(p2.x - width2, p2.y);
        ctx.lineTo(p2.x + width2, p2.y);
        ctx.lineTo(p1.x + width1, p1.y);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = asset.trim || '#1b232c';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(p1.x - width1 * 0.45, p1.y);
        ctx.lineTo(p2.x - width2 * 0.45, p2.y);
        ctx.moveTo(p1.x + width1 * 0.45, p1.y);
        ctx.lineTo(p2.x + width2 * 0.45, p2.y);
        ctx.stroke();

        ctx.strokeStyle = asset.detail || 'rgba(255,245,217,0.9)';
        ctx.lineWidth = 1.2;
        for (let z = obs.z + 20; z < obs.z + obs.length; z += 42) {
          const p = project(laneValue, z, curveShift);
          const w = (obs.variant === 'divider' ? laneUnit * 0.1 : laneUnit * 0.32) * p.scale;
          ctx.beginPath();
          ctx.moveTo(p.x - w * 0.5, p.y);
          ctx.lineTo(p.x + w * 0.5, p.y);
          ctx.stroke();
        }
      }

      function drawColliderQuad(laneMin, laneMax, zNear, zFar, curveShift) {
        const p1 = project(laneMin, zNear, curveShift);
        const p2 = project(laneMax, zNear, curveShift);
        const p3 = project(laneMax, zFar, curveShift);
        const p4 = project(laneMin, zFar, curveShift);
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 83, 83, 0.95)';
        ctx.fillStyle = 'rgba(255, 83, 83, 0.12)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.lineTo(p4.x, p4.y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawObstacleCollider(obs, curveShift) {
        const visibleMinZ = getMinVisibleZ();
        const visibleMaxZ = getMaxVisibleZ();
        const laneValue = getObstacleLane(obs);
        const laneMin = laneValue - obs.hitWidth;
        const laneMax = laneValue + obs.hitWidth;

        if (obs.kind === 'long') {
          if (!longObstacleHasVisibleSegment(obs, visibleMinZ, visibleMaxZ)) return;
          if (Array.isArray(obs.segmentOffsets) && obs.segmentOffsets.length > 0) {
            const stepZ = Math.max(28, obs.segmentStepZ || 56);
            for (const offset of obs.segmentOffsets) {
              const zNear = clamp(obs.z + offset, visibleMinZ, visibleMaxZ);
              const zFar = clamp(obs.z + offset + stepZ * 0.98, visibleMinZ, visibleMaxZ);
              if (zFar <= zNear) continue;
              drawColliderQuad(laneMin, laneMax, zNear, zFar, curveShift);
            }
            return;
          }
          const zNear = clamp(obs.z, visibleMinZ, visibleMaxZ);
          const zFar = clamp(obs.z + obs.length, visibleMinZ, visibleMaxZ);
          if (zFar <= zNear) return;
          drawColliderQuad(laneMin, laneMax, zNear, zFar, curveShift);
          return;
        }

        const zNear = clamp(obs.z - 12, visibleMinZ, visibleMaxZ);
        const zFar = clamp(obs.z + 12, visibleMinZ, visibleMaxZ);
        if (zFar <= zNear) return;
        drawColliderQuad(laneMin, laneMax, zNear, zFar, curveShift);
      }

      function drawObstaclePlaceholder(asset, width, height, scale) {
        const template = asset.template || 'crate';

        if (template === 'bike' || template === 'switcherBike' || template === 'crosserFast' || template === 'crosserFastAlt') {
          ctx.fillStyle = asset.body;
          roundRectPath(-width * 0.44, -height * 0.7, width * 0.88, height * 0.34, 6 * scale);
          ctx.fill();

          ctx.fillStyle = asset.trim;
          roundRectPath(-width * 0.3, -height * 0.9, width * 0.6, height * 0.18, 4 * scale);
          ctx.fill();

          ctx.fillStyle = asset.trim;
          ctx.beginPath();
          ctx.arc(-width * 0.28, -height * 0.18, height * 0.14, 0, Math.PI * 2);
          ctx.arc(width * 0.28, -height * 0.18, height * 0.14, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = asset.detail;
          ctx.beginPath();
          ctx.arc(0, -height * 0.52, height * 0.08, 0, Math.PI * 2);
          ctx.fill();
          return;
        }

        if (template === 'crosserHeavy' || template === 'crosserHeavyAlt') {
          ctx.fillStyle = asset.body;
          roundRectPath(-width * 0.5, -height * 0.78, width, height * 0.66, 7 * scale);
          ctx.fill();
          ctx.fillStyle = asset.trim;
          roundRectPath(-width * 0.24, -height * 0.94, width * 0.48, height * 0.2, 4 * scale);
          ctx.fill();
          ctx.fillStyle = asset.detail;
          ctx.fillRect(-width * 0.32, -height * 0.56, width * 0.64, height * 0.16);
          return;
        }

        if (template === 'bin') {
          ctx.fillStyle = asset.body;
          roundRectPath(-width * 0.44, -height * 0.94, width * 0.88, height * 0.82, 6 * scale);
          ctx.fill();
          ctx.fillStyle = asset.trim;
          roundRectPath(-width * 0.5, -height, width, height * 0.14, 4 * scale);
          ctx.fill();
          ctx.fillStyle = asset.detail;
          ctx.fillRect(-width * 0.26, -height * 0.7, width * 0.52, height * 0.2);
          return;
        }

        ctx.fillStyle = asset.body;
        roundRectPath(-width * 0.5, -height * 0.9, width, height * 0.78, 6 * scale);
        ctx.fill();
        ctx.strokeStyle = asset.trim;
        ctx.lineWidth = Math.max(1, 2 * scale);
        ctx.beginPath();
        ctx.moveTo(-width * 0.5, -height * 0.55);
        ctx.lineTo(width * 0.5, -height * 0.55);
        ctx.moveTo(-width * 0.1, -height * 0.9);
        ctx.lineTo(-width * 0.1, -height * 0.12);
        ctx.stroke();
        ctx.fillStyle = asset.detail;
        ctx.fillRect(width * 0.26, -height * 0.46, width * 0.14, height * 0.14);
      }

      function drawPowerup(pow, curveShift) {
        const p = project(pow.lane, pow.z, curveShift);
        const scale = obstacleViewportScale();
        const img = getImageByPath(pow.type.image);
        const baseSize = road.laneWidth * getAssetLaneFraction() * scale;
        const bobWave = Math.sin(pow.bob) + Math.sin(pow.bob * 2.1) * 0.35;
        const r = 18 * p.scale * scale * (1 + bobWave * 0.18);
        const bobOffset = bobWave * Math.max(8, 20 * p.scale * scale);
        ctx.save();
        ctx.translate(Math.round(p.x), Math.round(p.y - 24 * p.scale + bobOffset));
        ctx.rotate(Math.sin(pow.bob * 1.7) * 0.08);

        if (img) {
          const dims = getSpriteDimensions(img.naturalWidth, img.naturalHeight, baseSize);
          ctx.drawImage(img, Math.round(-dims.width * 0.5), Math.round(-dims.height * 0.8), dims.width, dims.height);
        } else {
          ctx.fillStyle = pow.type.color;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.8)';
          ctx.lineWidth = 2 * p.scale;
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPlayer(curveShift) {
        const playerZ = 16;
        const playerScale = obstacleViewportScale();
        const baseSize = road.laneWidth * getAssetLaneFraction() * playerScale;
        const fallbackWidth = 70 * clamp(road.laneWidth / 150, 0.58, 1.2) * playerScale;
        const fallbackHeight = 120 * clamp(road.laneWidth / 150, 0.58, 1.2) * playerScale;
        const drawRider = (laneValue, spritePath, phaseOffset) => {
          const p = project(laneValue, playerZ, curveShift);
          const bob = Math.sin(state.time * 8 + phaseOffset) * (2.5 * playerScale);
          const playerImg = getImageByPath(spritePath);
          let width = fallbackWidth;
          let height = fallbackHeight;

          ctx.save();
          ctx.translate(Math.round(p.x), Math.round(p.y + bob));

          if (playerImg) {
            const dims = getSpriteDimensions(playerImg.naturalWidth, playerImg.naturalHeight, baseSize);
            width = dims.width;
            height = dims.height;
            ctx.drawImage(playerImg, Math.round(-width * 0.5), Math.round(-height), width, height);
            ctx.restore();
            return;
          }

          ctx.fillStyle = '#1b232c';
          roundRectPath(-width * 0.35, -height * 0.55, width * 0.7, height * 0.6, 12);
          ctx.fill();

          ctx.fillStyle = '#f1b84c';
          roundRectPath(-width * 0.28, -height * 0.95, width * 0.56, height * 0.4, 12);
          ctx.fill();

          ctx.fillStyle = '#0b1218';
          ctx.fillRect(-width * 0.4, -height * 0.1, width * 0.8, height * 0.2);

          ctx.fillStyle = '#f65a4b';
          ctx.beginPath();
          ctx.arc(-width * 0.3, 0, 12, 0, Math.PI * 2);
          ctx.arc(width * 0.3, 0, 12, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = '#fff1d8';
          ctx.beginPath();
          ctx.arc(0, -height * 0.65, 12, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();
        };

        if (state.mode === 'ready') {
          drawRider(-0.34, playerSprites[0] || '', 0);
          drawRider(0.34, playerSprites[1] || playerSprites[0] || '', 0.9);
          return;
        }

        const playerSpritePath = playerSprites[state.playerSpriteIndex % playerSprites.length] || playerSprites[0] || '';
        drawRider(state.lane, playerSpritePath, 0);
      }

      function drawCrashEffects(curveShift) {
        if (!state.crashFx.active || state.mode !== 'over') return;

        if (state.crashFx.flashTimer > 0) {
          const flashAlpha = clamp(state.crashFx.flashTimer / 0.18, 0, 1) * 0.9;
          ctx.save();
          ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha.toFixed(3)})`;
          ctx.fillRect(0, 0, W, H);
          ctx.restore();
        }

        const smokeElapsed = Math.max(0, state.time - state.crashFx.startedAt);
        const anchor = project(state.crashFx.lane, 18, curveShift);
        const baseX = anchor.x;
        const baseY = anchor.y - road.laneWidth * 0.08;

        ctx.save();
        for (let i = 0; i < 8; i++) {
          const cycle = 1.45 + i * 0.11;
          const phase = ((smokeElapsed + i * 0.17) % cycle) / cycle;
          const rise = phase * (66 + i * 5);
          const drift = Math.sin(smokeElapsed * 1.8 + i * 1.3) * (7 + i * 1.8);
          const radius = 10 + i * 1.8 + phase * 16;
          const alpha = clamp(0.42 - phase * 0.36, 0.05, 0.44);

          ctx.fillStyle = `rgba(66, 70, 76, ${alpha.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(baseX + drift, baseY - rise, radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function loop(ts) {
        if (!state.last) state.last = ts;
        const dt = Math.min((ts - state.last) / 1000, 0.033);
        state.last = ts;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener('resize', resize);
      window.addEventListener('keydown', (e) => {
        if (state.mode === 'ready') ensureBgmPlaying();
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') handleInput(-1);
        if (e.code === 'ArrowRight' || e.code === 'KeyD') handleInput(1);
        if (e.code === 'Space') handleInput(0);
        if (e.code === 'KeyP') togglePause();
        if (e.code === 'KeyM') toggleSound();
        if (e.code === 'Escape') goHome();
        if (e.code === 'KeyV') {
          if (state.mode !== 'running') startGame();
          const profile = getDifficultyProfile(state.distance);
          spawnObstacle(profile, 'dividerLong', { ignoreDividerGate: true, ignorePlacement: true });
        }
        if (e.code === 'KeyC') {
          showColliderDebug = !showColliderDebug;
        }
      });

      leftBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleInput(-1);
      });
      rightBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleInput(1);
      });
      homeBtn.addEventListener('click', () => goHome());
      pauseBtn.addEventListener('click', () => togglePause());
      soundBtn.addEventListener('click', () => toggleSound());

      let touchStart = null;
      window.addEventListener('pointerdown', (e) => {
        if (state.mode === 'ready') ensureBgmPlaying();
        if (e.target && e.target.closest && e.target.closest('button')) {
          touchStart = null;
          return;
        }
        touchStart = { x: e.clientX, y: e.clientY };
      });
      window.addEventListener('pointerup', (e) => {
        if (!touchStart) return;
        const dx = e.clientX - touchStart.x;
        const dy = e.clientY - touchStart.y;
        if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
          handleInput(dx > 0 ? 1 : -1);
        } else if (state.mode === 'ready' || state.mode === 'over') {
          handleInput(0);
        }
        touchStart = null;
      });

      restartBtn.addEventListener('click', () => startGame());

      state.highScore = loadHighScore();
      applySoundState();
      setPauseButtonState(false);
      ensureBgmPlaying();
      introEl.style.display = 'flex';
      if (dashboardEl) dashboardEl.style.display = 'none';
      bannerEl.style.display = 'none';
      resize();
      updateHUD(0, 1);
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
