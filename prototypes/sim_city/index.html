<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Belief in Motion</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+10&family=VT323&display=swap');

    :root {
      --ink: #0a0f14;
      --road: #1b232c;
      --lane: rgba(184, 254, 255, 0.7);
      --edge: rgba(40, 135, 162, 0.91);
      --accent: #f65a4b;
      --accent-2: #f1b84c;
      --mint: #6fe2c8;
      --sky-1: #f8b18a;
      --sky-2: #9dd7ff;
      --glow: rgba(255, 184, 120, 0.3);
      --font-display: "Jersey 10", "Impact", "Arial Black", sans-serif;
      --font-body: "VT323", "Courier New", monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 10% 10%, #d0fcff, #a0d9ff 45%, #5671b6 100%);
      color: #f6f1ea;
      font-family: var(--font-body);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      left: 20px;
      top: 18px;
      padding: 14px 16px;
      background: rgba(10, 15, 20, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(10, 15, 20, 0.45);
      backdrop-filter: blur(10px);
      max-width: 320px;
    }

    .hud h1 {
      margin: 0 0 6px 0;
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 1px;
      color: #fff3df;
    }

    .hud .stats {
      display: grid;
      grid-template-columns: auto auto;
      gap: 6px 14px;
      font-size: 14px;
    }

    .hud .stats span {
      color: #f6c18b;
      font-weight: 600;
    }

    .hud .tipline {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
    }

    .banner {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(10, 15, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-family: var(--font-display);
      box-shadow: 0 0 25px rgba(246, 90, 75, 0.35);
      animation: pulse 2.4s ease-in-out infinite;
    }

    .intro {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
      z-index: 2;
      text-align: center;
      padding: 18px;
      padding-bottom: 100px;
      margin-top: -100px;
    }

    .intro .title {
      width: min(76vw, 720px);
      max-height: 38vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      object-fit: contain;
    }

    .intro .start-text {
      font-family: var(--font-display);
      font-size: clamp(24px, 4.5vw, 40px);
      letter-spacing: 1.2px;
      color: #fff3df;
      text-shadow: none;
      animation: introPulse 1.35s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 25px rgba(246, 90, 75, 0.3); }
      50% { transform: translateX(-50%) scale(1.04); box-shadow: 0 0 40px rgba(246, 90, 75, 0.6); }
    }

    @keyframes introPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.84;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    .meter {
      position: absolute;
      right: 20px;
      top: 18px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(10, 15, 20, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
    }

    .meter .label {
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1.4px;
      font-family: var(--font-display);
      color: rgba(255, 255, 255, 0.65);
    }

    .meter .value {
      font-size: 18px;
      font-weight: 700;
      color: #fff1d8;
    }

    .meter .power {
      font-size: 12px;
      color: #6fe2c8;
      min-height: 16px;
    }

    .dashboard {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      width: clamp(300px, 46vw, 560px);
      aspect-ratio: 128 / 28;
      pointer-events: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      z-index: 3;
    }

    .dashboard .bg,
    .dashboard .bg-boost {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      user-select: none;
      pointer-events: none;
    }

    .dashboard .bg-boost {
      opacity: 0;
    }

    .dashboard.boosted .bg-boost {
      opacity: 1;
    }

    .dash-value {
      position: absolute;
      font-family: var(--font-display);
      font-size: clamp(14px, 2.1vw, 24px);
      line-height: 1;
      letter-spacing: 0.5px;
      color: #ecfff9;
      text-shadow: 1px 1px 0 rgba(10, 15, 20, 0.9), -1px 0 0 rgba(10, 15, 20, 0.7);
      white-space: nowrap;
      max-width: 46%;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }

    .dash-value.speed {
      left: 12%;
      top: 64%;
      transform: translate(-50%, -50%);
      max-width: 24%;
    }

    .dash-value.distance {
      left: 41%;
      top: 64%;
      transform: translate(-50%, -50%);
      max-width: 24%;
    }

    .dash-value.speed,
    .dash-value.distance {
      font-size: clamp(14px, 2.1vw, 24px);
    }

    .dash-value.score {
      left: 64%;
      top: 28%;
      transform: translate(-50%, -50%);
      max-width: 26%;
    }

    .dash-value.highscore {
      left: 66%;
      top: 69%;
      transform: translate(-50%, -50%);
      max-width: 26%;
    }

    .dash-hidden {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .gameover {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 12, 16, 0.68);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 10;
    }

    .gameover.show {
      opacity: 1;
      pointer-events: auto;
    }

    .card {
      width: min(500px, 92vw);
      aspect-ratio: 1 / 1;
      padding: clamp(20px, 8%, 40px);
      text-align: center;
      border: none;
      box-shadow: 0 20px 44px rgba(8, 12, 16, 0.58);
      background: url('assets/sprites/ui/ui_gameover.png') center / 100% 100% no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2.8vw, 16px);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .card h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(34px, 7.8vw, 56px);
      color: #ff3a38;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 rgba(39, 8, 8, 0.75);
    }

    .card .tip {
      margin: 0;
      font-size: clamp(16px, 2.8vw, 24px);
      color: rgba(255, 255, 255, 0.82);
      max-width: 84%;
    }

    .card button {
      border: none;
      border-radius: 0;
      width: clamp(190px, 64%, 310px);
      aspect-ratio: 46 / 12;
      padding: 0;
      background: url('assets/sprites/ui/ui_restartbutton.png') center / 100% 100% no-repeat;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-size: clamp(18px, 3vw, 30px);
      color: #ffffff;
      text-shadow: 1px 1px 0 rgba(12, 16, 22, 0.9);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .card button:active {
      transform: translateY(1px) scale(0.98);
    }

    .card .hint {
      margin: 0;
      font-size: clamp(14px, 2.2vw, 20px);
      color: rgba(255, 255, 255, 0.76);
      max-width: 92%;
    }

    .legend {
      position: absolute;
      left: 20px;
      bottom: 18px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.72);
    }

    .legend span {
      background: rgba(255, 255, 255, 0.12);
      padding: 2px 6px;
      border-radius: 6px;
      margin: 0 2px;
      display: inline-block;
    }

    .touch-controls {
      position: absolute;
      left: 50%;
      bottom: 70px;
      transform: translateX(-50%);
      display: none;
      gap: 16px;
      pointer-events: auto;
    }

    .touch-btn {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(10, 15, 20, 0.55);
      color: #fff1d8;
      font-size: 28px;
      display: grid;
      place-items: center;
      box-shadow: 0 12px 28px rgba(10, 15, 20, 0.4);
      user-select: none;
      touch-action: manipulation;
    }

    .touch-btn:active {
      transform: scale(0.96);
      background: rgba(246, 90, 75, 0.5);
    }

    .top-controls {
      position: absolute;
      left: 10px;
      top: 10px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
      z-index: 9;
    }

    .top-btn {
      width: 54px;
      height: 54px;
      border: 4px solid #080c10;
      border-radius: 8px;
      background: #2cc7d0;
      box-shadow: inset 0 0 0 2px #9ff6ff, 0 3px 0 #080c10;
      cursor: pointer;
      user-select: none;
      display: grid;
      place-items: center;
      padding: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .top-btn .icon {
      width: 24px;
      height: 24px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      pointer-events: none;
    }

    .top-btn:active {
      transform: translateY(1px);
      box-shadow: inset 0 0 0 2px #9ff6ff, 0 2px 0 #080c10;
    }

    .top-btn.paused {
      background: #f14c4c;
    }

    .top-btn.sound-off {
      background: #687788;
    }

    .top-btn.sound-off .icon {
      opacity: 0.6;
    }

    @media (max-width: 720px) {
      .dashboard { top: 6px; width: clamp(260px, 92vw, 480px); }
      .legend { left: 12px; bottom: 12px; }
      .banner { font-size: 12px; }
      .top-controls { left: 8px; top: 8px; gap: 6px; }
      .top-btn {
        width: 44px;
        height: 44px;
        border-width: 3px;
        border-radius: 7px;
      }
      .top-btn .icon {
        width: 20px;
        height: 20px;
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .touch-controls { display: flex; }
      .legend { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="ui">
    <div class="top-controls" id="topControls">
      <button class="top-btn" id="homeBtn" aria-label="Go to home screen">
        <img class="icon" src="assets/sprites/ui/icon_home.png" alt="" />
      </button>
      <button class="top-btn" id="pauseBtn" aria-label="Pause game">
        <img class="icon" id="pauseIcon" src="assets/sprites/ui/icon_pause.png" alt="" />
      </button>
      <button class="top-btn" id="soundBtn" aria-label="Toggle sound">
        <img class="icon" src="assets/sprites/ui/icon_sound.png" alt="" />
      </button>
    </div>
    <div class="intro" id="intro">
      <img class="title" src="assets/sprites/ui/ui_title.png" alt="Saigon Street Sprint" />
      <div class="start-text">Tap or press Space to start</div>
    </div>
    <div class="dashboard" id="dashboard">
      <img class="bg" src="assets/sprites/ui/ui_dashboard.png" alt="HUD" />
      <img class="bg-boost" src="assets/sprites/ui/ui_dashboard_boosted.png" alt="" />
      <div class="dash-value speed" id="speed">0</div>
      <div class="dash-value distance" id="distance">0</div>
      <div class="dash-value score" id="score">0</div>
      <div class="dash-value highscore" id="highscore">0</div>
      <div class="dash-hidden" id="power">&nbsp;</div>
    </div>
    <div class="banner" id="banner">Tap or press Space to ride</div>
    <div class="legend">Switch lanes: <span>A</span><span>D</span> or <span>Left</span><span>Right</span> | Powerups: <span>Double Speed & Double Points</span></div>
    <div class="touch-controls" id="touchControls">
      <button class="touch-btn" id="leftBtn" aria-label="Move left">◀</button>
      <button class="touch-btn" id="rightBtn" aria-label="Move right">▶</button>
    </div>
    <div class="gameover" id="gameover">
      <div class="card">
        <h2>Game Over</h2>
        <p class="tip" id="tip">Tip: Keep distance from parked buses. They hide door swings.</p>
        <button id="restart" aria-label="Restart run">Play Again?</button>
        <p class="hint" id="restartHint">Tap or press Space to ride again</p>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const distanceEl = document.getElementById('distance');
      const scoreEl = document.getElementById('score');
      const highScoreEl = document.getElementById('highscore');
      const speedEl = document.getElementById('speed');
      const powerEl = document.getElementById('power');
      const dashboardEl = document.getElementById('dashboard');
      const introEl = document.getElementById('intro');
      const bannerEl = document.getElementById('banner');
      const gameoverEl = document.getElementById('gameover');
      const tipEl = document.getElementById('tip');
      const restartBtn = document.getElementById('restart');
      const homeBtn = document.getElementById('homeBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const pauseIconEl = document.getElementById('pauseIcon');
      const soundBtn = document.getElementById('soundBtn');
      const leftBtn = document.getElementById('leftBtn');
      const rightBtn = document.getElementById('rightBtn');

      let W = 0, H = 0, DPR = 1;
      let skyline = [];
      let roadDecals = null;

      const rand = (a, b) => a + Math.random() * (b - a);
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const mod = (n, m) => ((n % m) + m) % m;
      const hash01 = (seed) => {
        const v = Math.sin(seed * 127.1 + 311.7) * 43758.5453123;
        return v - Math.floor(v);
      };
      const PAUSE_ICON_SRC = 'assets/sprites/ui/icon_pause.png';
      const PLAY_ICON_SRC = 'assets/sprites/ui/icon_play.png';
      const SIDEWALK_TILE_SRC = 'assets/sprites/ui/ui_sidewalk.png';
      const MAX_SIDEWALK_DECORS = 6;

      const road = {
        maxZ: 900,
        laneCount: 3,
        topY: 0,
        bottomY: 0,
        left: 0,
        right: 0,
        width: 0,
        laneWidth: 0
      };

      const HI_SCORE_KEY = 'saigon_street_sprint_hi_score';

      const state = {
        mode: 'ready',
        speed: 240,
        distance: 0,
        score: 0,
        highScore: 0,
        bonusScore: 0,
        multiplier: 1,
        multiplierTimer: 0,
        speedBoost: 1,
        introDistance: 0,
        lane: 0,
        targetLane: 0,
        laneVelocity: 0,
        spawnTimer: 1.6,
        obstacles: [],
        powerups: [],
        sidewalkDecors: [],
        sidewalkSpawnTimer: 0.2,
        lastSidewalkAssetPath: '',
        lastSidewalkSide: 1,
        lastSpawnMechanicKey: null,
        lastSpawnAssetKey: null,
        playerSpriteIndex: 0,
        crashFx: {
          active: false,
          lane: 0,
          flashTimer: 0,
          startedAt: 0
        },
        soundEnabled: true,
        lastTip: 'Tip: Keep distance from parked buses. They hide door swings.',
        time: 0
      };

      const tips = {
        static: 'Tip: Glide early into the open lane. Static hazards stay put.',
        dividerLong: 'Tip: Divider barriers stay in the middle. Clear center lane early.',
        constructionLong: 'Tip: Long roadwork blocks one lane for a while. Commit to another lane.',
        crossingFast: 'Tip: Fast crossers are small but sudden. Predict, do not react late.',
        crossingHeavy: 'Tip: Big crossers move slower but occupy more width. Give them a full lane.',
        crossingReverse: 'Tip: Ox carts cross the opposite way. Watch both sides before committing.',
        switcher: 'Tip: If a bike signals, assume it will merge. Leave it space before the switch.'
      };

      function createSfx(path, volume) {
        const audio = new Audio(path);
        audio.preload = 'auto';
        audio.volume = clamp(volume, 0, 1);
        return audio;
      }

      const sfx = {
        boost: createSfx('assets/sounds/boost.wav', 0.7),
        gameOver: createSfx('assets/sounds/gameover.wav', 0.8)
      };

      function createMusic(path, volume) {
        const audio = new Audio(path);
        audio.preload = 'auto';
        audio.autoplay = true;
        audio.loop = true;
        audio.volume = clamp(volume, 0, 1);
        audio.playbackRate = 1;
        return audio;
      }

      const bgm = createMusic('assets/sounds/background_track.mp3', 0.45);

      function playSfx(key) {
        const audio = sfx[key];
        if (!audio) return;
        try {
          audio.currentTime = 0;
          const p = audio.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        } catch (_) {
          // Ignore blocked/failed playback so game logic never breaks.
        }
      }

      function ensureBgmPlaying() {
        if (!bgm.paused) return;
        try {
          const p = bgm.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        } catch (_) {
          // Ignore blocked autoplay until user interaction retries.
        }
      }

      function updateBgmPlayback(dt) {
        const targetRate = state.mode === 'running' && state.multiplierTimer > 0 ? 2 : 1;
        const ease = 1 - Math.exp(-dt * 8);
        bgm.playbackRate = lerp(bgm.playbackRate || 1, targetRate, ease);
        if (Math.abs(bgm.playbackRate - targetRate) < 0.01) bgm.playbackRate = targetRate;
      }

      function applySoundState() {
        const muted = !state.soundEnabled;
        bgm.muted = muted;
        for (const audio of Object.values(sfx)) {
          audio.muted = muted;
        }
        soundBtn.classList.toggle('sound-off', muted);
        soundBtn.setAttribute('aria-label', muted ? 'Turn sound on' : 'Turn sound off');
      }

      function setPauseButtonState(paused) {
        pauseBtn.classList.toggle('paused', paused);
        if (pauseIconEl) {
          pauseIconEl.src = paused ? PLAY_ICON_SRC : PAUSE_ICON_SRC;
        }
        pauseBtn.setAttribute('aria-label', paused ? 'Resume game' : 'Pause game');
      }

      function togglePause() {
        if (state.mode === 'running') {
          state.mode = 'paused';
          bgm.pause();
          setPauseButtonState(true);
          return;
        }
        if (state.mode === 'paused') {
          state.mode = 'running';
          ensureBgmPlaying();
          setPauseButtonState(false);
        }
      }

      function goHome() {
        state.mode = 'ready';
        state.distance = 0;
        state.score = 0;
        state.bonusScore = 0;
        state.multiplier = 1;
        state.multiplierTimer = 0;
        state.speedBoost = 1;
        state.lane = 0;
        state.targetLane = 0;
        state.obstacles = [];
        state.powerups = [];
        state.sidewalkDecors = [];
        state.sidewalkSpawnTimer = 0.04;
        state.spawnTimer = 1.4;
        state.crashFx.active = false;
        state.crashFx.flashTimer = 0;
        state.crashFx.startedAt = 0;
        state.introDistance = 0;
        introEl.style.display = 'flex';
        gameoverEl.classList.remove('show');
        if (dashboardEl) dashboardEl.style.display = 'none';
        bannerEl.style.display = 'none';
        bgm.playbackRate = 1;
        ensureBgmPlaying();
        setPauseButtonState(false);
        updateHUD(0, 1);
      }

      function toggleSound() {
        state.soundEnabled = !state.soundEnabled;
        applySoundState();
      }

      const laneChoices = [-1, 0, 1];
      const imageCache = new Map();
      let showColliderDebug = false;
      const ASSET_LANE_FRACTION = 2 / 3;
      const MOBILE_ASSET_LANE_FRACTION = 0.9;

      function getAssetLaneFraction() {
        return W <= 820 ? MOBILE_ASSET_LANE_FRACTION : ASSET_LANE_FRACTION;
      }

      // Asset placeholders by mechanic.
      // Replace placeholder art by setting image paths; names do not need a strict convention.
      // Keep width/height tuned to your sprite proportions for clear orthographic readability/collision feel.
      // Full pipeline docs: assets/ASSET_GUIDE.md
      // Optional per-type random versions:
      // spriteVersions: [{ image: '...v1.png' }, { image: '...v2.png' }, { image: '...v3.png' }]
      // Optional per-asset death tip:
      // tip: 'Your custom end-screen message for this specific asset'
      // To reuse mechanics with multiple visuals, add more keys in obstacleMechanics.*.assets.
      const obstacleAssets = {
        motorbikeStatic: { template: 'bike', width: 46, height: 62, body: '#f65a4b', trim: '#1b232c', detail: '#ffd977', label: 'Motorbike', image: 'assets/sprites/static/static_driver.png', tip: 'Tip: Parked motorbikes are narrow. Shift lanes early instead of swerving late.' },
        truckStatic: { template: 'bin', width: 52, height: 70, body: '#5aa0d5', trim: '#1b232c', detail: '#dff2ff', label: 'Truck', image: 'assets/sprites/static/static_truck.png', tip: 'Tip: Static trucks block more space than they look. Commit to the next lane sooner.' },
        carStatic: { template: 'crate', width: 48, height: 64, body: '#ef7249', trim: '#1b232c', detail: '#ffd977', label: 'Car', image: 'assets/sprites/static/static_car.png', tip: 'Tip: Static cars close the lane fast. Keep one lane as a buffer.' },
        potholeStatic: { template: 'crate', width: 44, height: 44, body: '#4e4e4e', trim: '#1b232c', detail: '#2f2f2f', label: 'Pothole', image: 'assets/sprites/static/static_pothole.png', sizeMul: 0.78, tip: 'Tip: Potholes are small but dangerous. Keep scanning one lane ahead and shift early.' },
        medianBlocks: {
