name: Deploy Stories Mailbox

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/story-archive-pages.yml"
      - "prototypes/story_archive/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: story-archive-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload story archive artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototypes/story_archive

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
